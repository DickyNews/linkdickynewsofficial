<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --glass: rgba(255, 255, 255, 0.92); 
            --bg: #f2f2f7; 
            --text: #1c1c1e; 
            --green: #28a745; 
            --red: #ff3b30;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; }
        #constellationCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border-radius: 40px; padding: 40px; width: 100%; max-width: 480px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 1px solid rgba(255, 255, 255, 0.5); box-sizing: border-box; }
        h2 { font-weight: 700; margin: 0 0 15px 0; font-size: 26px; }
        .desc { font-size: 14px; color: #3a3a3c; margin-bottom: 30px; line-height: 1.5; }

        @keyframes pulse-active {
            0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1); }
            50% { transform: scale(1.03); box-shadow: 0 10px 25px rgba(0, 122, 255, 0.2); }
            100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1); }
        }

        .task-item { background: #fff; border: 1.5px solid #e5e5ea; padding: 18px 22px; margin: 12px 0; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; opacity: 0.5; transition: all 0.3s ease; width: 100%; box-sizing: border-box; font-size: 14px; font-weight: 500; color: var(--text); text-align: left; position: relative; }
        .task-item.is-active { opacity: 1; border-color: var(--ios-blue); animation: pulse-active 2s infinite ease-in-out; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); border-color: var(--red); }
            70% { box-shadow: 0 0 0 12px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); border-color: var(--red); }
        }
        .task-item.is-error { animation: pulse-red 1.5s infinite; border-color: var(--red) !important; color: var(--red) !important; opacity: 1 !important; }
        .task-item.is-done { opacity: 1; background: var(--green); border: none; color: #fff; }
        
        .task-content { display: flex; align-items: center; flex: 1; }
        .task-content i { font-size: 20px; margin-right: 15px; width: 25px; text-align: center; }
        .btn-main { background: var(--ios-blue); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: 700; cursor: pointer; margin-top: 20px; display: none; font-size: 16px; }
        .yt { color: #ff0000; } .heart { color: #e1306c; }
    </style>
</head>
<body>

<canvas id="constellationCanvas"></canvas>
<div class="container"><div class="glass-card" id="app"></div></div>

<script>
    // Canvas Animation
    const canvas = document.getElementById('constellationCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    function animate() {
        ctx.fillStyle = 'rgba(242, 242, 247, 0.25)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if(particles.length < 150) {
            let side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            if(side === 0) { x = Math.random()*canvas.width; y = -20; vx = (Math.random()-0.5)*12; vy = Math.random()*10+5; }
            else if(side === 1) { x = Math.random()*canvas.width; y = canvas.height+20; vx = (Math.random()-0.5)*12; vy = -Math.random()*10-5; }
            else if(side === 2) { x = -20; y = Math.random()*canvas.height; vx = Math.random()*10+5; vy = (Math.random()-0.5)*12; }
            else { x = canvas.width+20; y = Math.random()*canvas.height; vx = -Math.random()*10-5; vy = (Math.random()-0.5)*12; }
            particles.push({ x, y, px: x, py: y, vx, vy, size: Math.random()*2+1, color: `hsl(${Math.random()*360}, 70%, 65%)` });
        }
        particles.forEach((p, i) => {
            p.px = p.x; p.py = p.y; p.x += p.vx; p.y += p.vy;
            ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = p.size; ctx.lineCap = 'round';
            ctx.moveTo(p.px, p.py); ctx.lineTo(p.x, p.y); ctx.stroke();
            if(p.x < -100 || p.x > canvas.width+100 || p.y < -100 || p.y > canvas.height+100) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    // TUGAS ASLI DARI WEB 2
    const mySocials = [
        { n: "Subscribe & Hit Bell YouTube", i: "fab fa-youtube yt", l: "https://www.youtube.com/@dickynewsofficial" },
        { n: "Like & Comment Video", i: "fas fa-heart heart", l: "https://youtu.be/g7ekOGN3MhM" }
    ];

    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    function renderUI() {
        if(!params.get("v")) {
            app.innerHTML = `<h2>LINK GENERATOR</h2><p class="desc">Tempel URL tujuan untuk membuat link unlocker.</p><input id="link" style="width:100%; padding:18px; border-radius:15px; border:1.5px solid #d1d1d6; margin-bottom:15px; box-sizing:border-box;" placeholder="Paste URL Tujuan..."> <button class="btn-main" style="display:block; background:#1c1c1e" onclick="generate()">Generate Link</button><div id="res"></div>`;
        } else {
            app.innerHTML = `<h2>VERIFIKASI</h2><p class="desc">Selesaikan langkah-langkah di bawah ini untuk membuka link.</p><div id="tasks"></div><button id="finalLink" class="btn-main" onclick="window.location.href=atob(params.get('v').replace(/-/g, '+').replace(/_/g, '/'))">AKSES LINK TUJUAN</button>`;
            const tasksContainer = document.getElementById("tasks");
            mySocials.forEach((s, idx) => {
                let b = document.createElement("button");
                b.className = "task-item";
                if(idx === 0) b.classList.add("is-active");
                b.dataset.attempt = "1";
                b.innerHTML = `<div class="task-content"><i class="${s.i}"></i><span>${s.n}</span></div>`;
                b.onclick = () => {
                    if(!b.classList.contains("is-active") || b.classList.contains("is-done") || b.disabled) return;
                    window.open(s.l, "_blank");
                    b.disabled = true;
                    b.classList.remove("is-error");
                    let count = 15;
                    let timer = setInterval(() => {
                        b.innerHTML = `<div class="task-content"><span>Sedang memverifikasi... ${count}s</span></div>`;
                        if(count-- <= 0) {
                            clearInterval(timer);
                            b.disabled = false;
                            if(parseInt(b.dataset.attempt) === 1) {
                                b.classList.add("is-error");
                                b.innerHTML = `<div class="task-content"><i class="fas fa-exclamation-circle"></i><span>Sistem gagal memverifikasi. Klik tombol ini lagi dan pastikan tugas selesai!</span></div>`;
                                b.dataset.attempt = "2";
                            } else {
                                b.classList.remove("is-active", "is-error");
                                b.classList.add("is-done");
                                b.innerHTML = `<div class="task-content"><i class="fas fa-check"></i><span>BERHASIL</span></div>`;
                                let next = document.querySelectorAll(".task-item")[idx + 1];
                                if(next) next.classList.add("is-active");
                                else document.getElementById("finalLink").style.display = "block";
                            }
                        }
                    }, 1000);
                };
                tasksContainer.appendChild(b);
            });
        }
    }
    window.generate = () => {
        let url = document.getElementById('link').value;
        if(url) {
            let encoded = btoa(url).replace(/=+$/, '').replace(/\+/g, '-').replace(/\//g, '_');
            let final = window.location.origin + window.location.pathname + "?v=" + encoded;
            document.getElementById('res').innerHTML = `<div style="margin-top:20px; padding:15px; background:#fff; border-radius:15px; font-size:11px; word-break:break-all; text-align:left;"><strong>Link Anda:</strong><br>${final}</div>`;
        }
    };
    renderUI();
</script>
</body>
</html>
