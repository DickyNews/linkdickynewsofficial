<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dicky News | Premium Link Unlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --glass: rgba(255, 255, 255, 0.92); 
            --bg: #f2f2f7; 
            --text: #1c1c1e; 
            --green: #28a745; 
            --red: #ff3b30;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Roboto', sans-serif; 
            overflow: hidden; 
        }
        
        #constellationCanvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; pointer-events: none; 
        }

        .container { 
            min-height: 100vh; display: flex; align-items: center; 
            justify-content: center; padding: 20px; position: relative; z-index: 1; 
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border-radius: 40px; 
            padding: 40px; 
            width: 100%; 
            max-width: 480px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-sizing: border-box;
        }

        h2 { font-weight: 700; margin: 0 0 15px 0; font-size: 26px; }
        .desc { font-size: 14px; color: #3a3a3c; margin-bottom: 30px; line-height: 1.5; }

        @keyframes pulse-active {
            0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1); }
            50% { transform: scale(1.03); box-shadow: 0 10px 25px rgba(0, 122, 255, 0.2); }
            100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1); }
        }

        .task-item { 
            background: #fff; 
            border: 1.5px solid #e5e5ea; 
            padding: 18px 22px; 
            margin: 12px 0; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            text-align: left;
        }

        .task-item:disabled { cursor: not-allowed; opacity: 0.6; }
        .is-checking { border-color: var(--ios-blue); }
        .is-error { border-color: var(--red) !important; color: var(--red) !important; }
        .is-done { background: var(--green) !important; color: #fff !important; border: none; }
        
        .btn-main { 
            background: var(--ios-blue); 
            color: #fff; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 20px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px;
        }
        
        .custom-input { width:100%; padding:18px; border-radius:15px; border:1.5px solid #d1d1d6; margin-bottom:15px; box-sizing:border-box; }
    </style>
</head>
<body>

<canvas id="constellationCanvas"></canvas>

<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    // Canvas Animation
    const canvas = document.getElementById('constellationCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    function animate() {
        ctx.fillStyle = 'rgba(242, 242, 247, 0.25)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if(particles.length < 150) {
            let side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            if(side === 0) { x = Math.random()*canvas.width; y = -20; vx = (Math.random()-0.5)*12; vy = Math.random()*10+5; }
            else if(side === 1) { x = Math.random()*canvas.width; y = canvas.height+20; vx = (Math.random()-0.5)*12; vy = -Math.random()*10-5; }
            else if(side === 2) { x = -20; y = Math.random()*canvas.height; vx = Math.random()*10+5; vy = (Math.random()-0.5)*12; }
            else { x = canvas.width+20; y = Math.random()*canvas.height; vx = -Math.random()*10-5; vy = (Math.random()-0.5)*12; }
            particles.push({ x, y, px: x, py: y, vx, vy, size: Math.random()*2+1, color: `hsl(${Math.random()*360}, 70%, 65%)` });
        }
        particles.forEach((p, i) => {
            p.px = p.x; p.py = p.y;
            p.x += p.vx; p.y += p.vy;
            ctx.beginPath();
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.size;
            ctx.lineCap = 'round';
            ctx.moveTo(p.px, p.py);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            if(p.x < -100 || p.x > canvas.width+100 || p.y < -100 || p.y > canvas.height+100) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    // Data Tasks (Tetap sama)
    const mySocials = [
        { n: "Subscribe & Hit Bell YouTube", i: "fab fa-youtube", l: "https://www.youtube.com/@dickynewsofficial" },
        { n: "Like & Comment Video", i: "fas fa-heart", l: "https://youtu.be/g7ekOGN3MhM" }
    ];

    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    if(!params.get("v")){
        app.innerHTML = `<h2>LINK GENERATOR</h2><p class="desc">Tempel URL tujuan untuk membuat link unlocker.</p><input id="inp" class="custom-input" placeholder="Paste Link Tujuan..."> <button class="btn-main" style="background:#1c1c1e" onclick="buat()">Generate Link</button><div id="res"></div>`;
        window.buat = function(){
            const val = document.getElementById("inp").value.trim();
            if(!val) return;
            const encoded = btoa(val).replace(/=+$/, '').replace(/\+/g, '-').replace(/\//g, '_');
            const final = window.location.origin + window.location.pathname + "?v=" + encoded;
            document.getElementById("res").innerHTML = `<div style="margin-top:20px; padding:15px; background:#fff; border-radius:15px; font-size:11px; word-break:break-all; text-align:left;"><strong>Link Anda:</strong><br>${final}</div>`;
        };
    } else {
        let target;
        try { target = atob(params.get("v").replace(/-/g, '+').replace(/_/g, '/')); } catch(e) { target = "#"; }
        app.innerHTML = `<h2>VERIFIKASI</h2><p class="desc">Selesaikan langkah-langkah di bawah ini untuk membuka link.</p><div id="tasks"></div><div id="final"></div>`;
        
        mySocials.forEach((s, idx) => {
            let b = document.createElement("button");
            b.className = "task-item";
            if(idx > 0) b.disabled = true;
            b.innerHTML = `<i class="${s.i}" style="margin-right:15px; width:20px;"></i><span>${s.n}</span>`;
            
            b.onclick = () => {
                if(b.classList.contains("is-done") || b.classList.contains("is-checking")) return;
                window.open(s.l, "_blank");
                b.classList.add("is-checking");
                let count = 10;
                let timer = setInterval(() => {
                    b.innerHTML = `<span>Sedang verifikasi... ${count}s</span>`;
                    if(count-- <= 0) {
                        clearInterval(timer);
                        b.classList.remove("is-checking");
                        b.classList.add("is-done");
                        b.innerHTML = `<i class="fas fa-check" style="margin-right:15px;"></i><span>BERHASIL</span>`;
                        if(document.querySelectorAll(".is-done").length === mySocials.length) {
                            document.getElementById("final").innerHTML = `<button class="btn-main" onclick="window.location.href='${target}'">AKSES LINK TUJUAN</button>`;
                        } else {
                            document.querySelectorAll(".task-item")[idx+1].disabled = false;
                        }
                    }
                }, 1000);
            };
            document.getElementById("tasks").appendChild(b);
        });
    }
</script>
</body>
</html>
